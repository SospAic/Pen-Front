port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  enable: false
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.0.0.1/dns-query
    - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:


- name: 43147-trojan-tcp-tls                         
  type: trojan
  server: la02.sospaic.top                       
  port: 43147                                     
  password: 8LrRltLBxR    
  udp: true
  sni: la02.sospaic.top
  skip-cert-verify: false


- name: 27230-vless-tcp                         
  type: vless
  server: la02.sospaic.top                       
  port: 27230                                     
  uuid: 64229518-24a5-4f4c-ac52-84103f51c06e     
  udp: true
  tls: false


- name: 32564-vless-tcp                         
  type: vless
  server: la02.sospaic.top                       
  port: 32564                                     
  uuid: 209d5b5b-50b3-40a9-e398-fdfad688eca0     
  udp: true
  tls: true


- name: 21651-vmess-tcp                         
  type: vmess
  server: la02.sospaic.top                        
  port: 21651                                     
  uuid: 5f11869e-c7ee-42ee-9938-b982bdb40704       
  alterId: 0
  cipher: auto
  udp: true
  tls: true


proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies: 

    - 21651-vmess-tcp
    - 32564-vless-tcp
    - 27230-vless-tcp
    - 43147-trojan-tcp-tls


- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:  

    - 21651-vmess-tcp
    - 32564-vless-tcp
    - 27230-vless-tcp
    - 43147-trojan-tcp-tls
    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT

    - 21651-vmess-tcp
    - 32564-vless-tcp
    - 27230-vless-tcp
    - 43147-trojan-tcp-tls

rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
