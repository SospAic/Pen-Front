port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  enable: false
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.0.0.1/dns-query
    - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:


- name: 51853-ss-tcp                         
  type: ss
  server: la03.sospaic.top                        
  port: 51853                                     
  password: T2JvU1FMZGlENEppekkzRUlCSWJTNjl4UEN3eDg2QnM=
  cipher: aes-256-gcm
  udp: true


- name: 52086-trojan-tcp-tls                         
  type: trojan
  server: la03.sospaic.top                       
  port: 52086                                     
  password: gdhNG9bb00    
  udp: true
  sni: la03.sospaic.top
  skip-cert-verify: false


- name: 15505-vless-tcp                         
  type: vless
  server: la03.sospaic.top                       
  port: 15505                                     
  uuid: 88c1877f-8526-4243-a2b3-f66b380c991e     
  udp: true
  tls: false


- name: 56120-vless-tcp                         
  type: vless
  server: la03.sospaic.top                       
  port: 56120                                     
  uuid: 12d589ab-2c20-4bd3-e72b-89170ce68322     
  udp: true
  tls: true


- name: 47955-vmess-tcp                         
  type: vmess
  server: la03.sospaic.top                        
  port: 47955                                     
  uuid: 8f68049c-d6c9-4d1e-f6dd-cae440bfa4bb       
  alterId: 0
  cipher: auto
  udp: true
  tls: true


proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies: 

    - 47955-vmess-tcp
    - 56120-vless-tcp
    - 15505-vless-tcp
    - 52086-trojan-tcp-tls
    - 51853-ss-tcp


- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:  

    - 47955-vmess-tcp
    - 56120-vless-tcp
    - 15505-vless-tcp
    - 52086-trojan-tcp-tls
    - 51853-ss-tcp
    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT

    - 47955-vmess-tcp
    - 56120-vless-tcp
    - 15505-vless-tcp
    - 52086-trojan-tcp-tls
    - 51853-ss-tcp

rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
