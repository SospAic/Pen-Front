port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  enable: false
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.0.0.1/dns-query
    - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:


- name: 28896-ss-tcp                         
  type: ss
  server: ut01.sospaic.top                        
  port: 28896                                     
  password: aWdjTFpQV3dBUVlHTW5qcXFVYVJ4NjlBdml6OVZkaDY=
  cipher: aes-256-gcm
  udp: true


- name: 24792-trojan-tcp-tls                         
  type: trojan
  server: ut01.sospaic.top                       
  port: 24792                                     
  password: Ot7v74ues7    
  udp: true
  sni: ut01.sospaic.top
  skip-cert-verify: false


- name: 27484-vless-tcp                         
  type: vless
  server: ut01.sospaic.top                       
  port: 27484                                     
  uuid: 9cdd97a4-684d-4206-faf6-f6aa70871d3a     
  udp: true
  tls: false


- name: 41635-vless-tcp                         
  type: vless
  server: ut01.sospaic.top                       
  port: 41635                                     
  uuid: d65f464d-278a-41d9-dbef-880fc97b965d     
  udp: true
  tls: true


- name: 14310-vmess-tcp                         
  type: vmess
  server: ut01.sospaic.top                        
  port: 14310                                     
  uuid: 34fec006-0261-42f0-b2d5-def3cad014c7       
  alterId: 0
  cipher: auto
  udp: true
  tls: true


proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies: 

    - 14310-vmess-tcp
    - 41635-vless-tcp
    - 27484-vless-tcp
    - 24792-trojan-tcp-tls
    - 28896-ss-tcp


- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:  

    - 14310-vmess-tcp
    - 41635-vless-tcp
    - 27484-vless-tcp
    - 24792-trojan-tcp-tls
    - 28896-ss-tcp
    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT

    - 14310-vmess-tcp
    - 41635-vless-tcp
    - 27484-vless-tcp
    - 24792-trojan-tcp-tls
    - 28896-ss-tcp

rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
